<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Manager · Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <h2>🔐 Lead Manager · Internal</h2>
        <div id="login-error" class="error-msg" style="display: none;">Invalid credentials</div>
        <div class="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="e.g. 123@lead.co" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••">
            </div>
            <button class="login-btn" id="login-btn">Sign in</button>
        </div>
        <hr>
        <div class="demo-hint">
            <strong>Demo:</strong> 123@lead.co / alpha<br>123@lead.co / beta • 123@lead.co / gamma
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
